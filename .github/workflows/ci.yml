name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type Check, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          ANTHROPIC_API_KEY: dummy-key-for-build
          GOOGLE_CLIENT_ID: dummy-id-for-build
          GOOGLE_CLIENT_SECRET: dummy-secret-for-build
          NEXTAUTH_SECRET: dummy-secret-for-build
          AUTH_SECRET: dummy-secret-for-build
          NEXTAUTH_URL: http://localhost:3000
          AUTH_URL: http://localhost:3000
          MONDAY_API_TOKEN: dummy-token-for-build
          MONDAY_BOARD_ID: "0"
          MONDAY_BACKLOG_GROUP_ID: "0"
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dummy-key-for-build
